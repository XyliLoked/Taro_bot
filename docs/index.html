<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мистическое Таро</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="main-title">🔮 ВЫБЕРИ РАСКЛАД 🔮</h1>
        
        <div class="question-container">
            <textarea id="userQuestion" class="question-input" placeholder="✍️ Напишите свой вопрос..." rows="2"></textarea>
            <div class="question-hint">Например: "Что ждет меня в любви?"</div>
        </div>

        <div id="content">
            <div class="menu-grid">
                <button class="magic-button" onclick="startReading('three_cards')">
                    <span class="button-text">Три карты</span>
                    <span class="button-subtext">Прошлое · Настоящее · Будущее</span>
                </button>
                
                <button class="magic-button" onclick="startReading('relationship')">
                    <span class="button-text">Отношения</span>
                    <span class="button-subtext">5 карт · Любовь · Партнерство</span>
                </button>
                
                <button class="magic-button" onclick="startReading('career')">
                    <span class="button-text">Карьера</span>
                    <span class="button-subtext">4 карты · Работа · Финансы</span>
                </button>
                
                <button class="magic-button" onclick="startReading('celtic_cross')">
                    <span class="button-text">Кельтский крест</span>
                    <span class="button-subtext">10 карт · Полный анализ</span>
                </button>
                
                <button class="magic-button" onclick="startReading('daily')">
                    <span class="button-text">Карта дня</span>
                    <span class="button-subtext">Совет на сегодня</span>
                </button>
                
                <button class="magic-button" onclick="startReading('five_cards')">
                    <span class="button-text">Пять карт</span>
                    <span class="button-subtext">Ситуация · Совет · Итог</span>
                </button>
            </div>
        </div>
        <div class="moon-phase"></div>
    </div>
    
    <!-- ========== ИСПРАВЛЕНИЕ: Добавлена строка ниже ========== -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
